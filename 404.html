<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusCodex - Redirecting…</title>
  <script>
    // GitHub Pages fallback for project/repo pages.
    // Redirect unknown routes back to index.html while preserving the path.
    (function () {
      var path = window.location.pathname + window.location.search + window.location.hash;
      var target = './index.html?redirect=' + encodeURIComponent(path);
      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
